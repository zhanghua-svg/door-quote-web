<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>门窗报价系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#fff;border-radius:12px;padding:40px 30px;width:100%;max-width:360px;box-shadow:0 2px 12px rgba(0,0,0,0.1);text-align:center}
.login-card h2{font-size:22px;margin-bottom:8px;color:#1a1a2e}
.login-card .sub{font-size:13px;color:#999;margin-bottom:28px}
.login-card input{width:100%;height:44px;border:1px solid #ddd;border-radius:8px;padding:0 14px;font-size:14px;margin-bottom:14px}
.login-card input:focus{border-color:#2980b9;outline:none}
.login-btn{width:100%;height:44px;background:#2980b9;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
.login-btn:active{opacity:0.85}
.main{display:none;max-width:100vw;overflow-x:hidden}
.main.show{display:block}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#2980b9;color:#fff}
.topbar .title{font-size:16px;font-weight:600}
.topbar .user{font-size:13px;opacity:0.9;cursor:pointer}
.menu{display:flex;gap:0;background:#fff;border-bottom:1px solid #eee;overflow-x:auto}
.menu span{flex-shrink:0;padding:12px 18px;font-size:14px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.menu span.active{color:#2980b9;border-bottom-color:#2980b9;font-weight:600}
.content{padding:12px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:12px;color:#1a1a2e}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;align-items:center}
.row label{font-size:13px;color:#666;white-space:nowrap}
.row input,.row select{flex:1;min-width:80px;height:36px;border:1px solid #ddd;border-radius:6px;padding:0 8px;font-size:13px}
.row input:focus,.row select:focus{border-color:#2980b9;outline:none}
.btn{display:inline-block;padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn-blue{background:#2980b9;color:#fff}
.btn-red{background:#e74c3c;color:#fff}
.btn-gray{background:#eee;color:#666}
.btn-outline{background:#fff;color:#2980b9;border:1px solid #2980b9}
.btn-block{display:block;width:100%;padding:10px;font-size:15px}
.btn-sm{padding:5px 12px;font-size:12px}
.gap{margin:4px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px}
table{min-width:900px;width:100%;border-collapse:collapse;font-size:12px}
table th{background:#2980b9;color:#fff;padding:8px 4px;font-weight:600;white-space:nowrap}
table td{padding:6px 4px;text-align:center;border-bottom:1px solid #eee}
table td input,table td select{width:100%;text-align:center;border:1px solid transparent;padding:4px 2px;font-size:12px;background:transparent}
table td input:focus,table td select:focus{border-color:#2980b9;background:#fafafa;border-radius:3px;outline:none}
table tr:nth-child(even){background:#fafbfc}
.del-col{color:#e74c3c;cursor:pointer;font-size:16px}
.user-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.user-row .uname{font-weight:500}
.user-row .umeta{font-size:12px;color:#999}
.type-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.type-row .info{flex:1}
.type-row .tname{font-weight:600;font-size:14px}
.type-row .tmeta{font-size:11px;color:#999;margin-top:2px}
.type-row .tmeta span{background:#f0f0f0;padding:2px 6px;border-radius:3px;margin-right:4px}
.color-tags{display:flex;flex-wrap:wrap;gap:8px}
.color-tag{display:flex;align-items:center;gap:4px;padding:6px 12px;background:#f5f5f5;border-radius:6px;font-size:13px}
.color-tag .del{color:#ccc;cursor:pointer;font-size:18px;line-height:1}
.total-bar{display:flex;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:10px;margin-bottom:12px;font-size:15px;font-weight:600}
.total-bar .big{color:#e74c3c;font-size:22px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:flex-end}
.overlay.show{display:flex}
.dialog{width:100%;max-height:85vh;background:#fff;border-radius:16px 16px 0 0;overflow-y:auto;padding:20px}
.dialog h3{font-size:17px;margin-bottom:16px}
.dialog .close{float:right;font-size:22px;color:#999;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="loginPage" class="login-page">
  <div class="login-card">
    <h2>🚪 门窗报价系统</h2>
    <div class="sub">请输入账号密码登录</div>
    <input id="loginUser" type="text" placeholder="账号">
    <input id="loginPwd" type="password" placeholder="密码">
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div style="margin-top:10px;font-size:12px;color:#999">管理员：admin / 123456</div>
  </div>
</div>

<div id="mainPage" class="main">
  <div class="topbar">
    <span class="title" id="topTitle">门窗报价系统</span>
    <span class="user" onclick="logout()">👤 <span id="topUser"></span> | 退出</span>
  </div>
  <div class="menu">
    <span class="active" onclick="switchTab('quote',this)">📋 新建报价</span>
    <span onclick="switchTab('history',this)">📚 历史记录</span>
    <span id="adminMenu" class="hidden" onclick="switchTab('admin',this)">⚙️ 管理后台</span>
  </div>
  <div class="content">

    <!-- 新建报价 -->
    <div id="tab-quote">
      <div class="card">
        <div class="row"><label>工程名称</label><input id="qProject" placeholder="如：天楼16#201室"><label>客户</label><input id="qName" placeholder="姓名"><label>电话</label><input id="qPhone" type="tel" placeholder="电话"></div>
      </div>
      <div class="table-wrap"><table><thead><tr><th style="width:40px">序号</th><th style="width:80px">位置</th><th style="width:100px">产品</th><th style="width:130px">宽×高(mm)</th><th style="width:70px">颜色</th><th style="width:80px">玻璃</th><th style="width:55px">面积</th><th style="width:45px">数量</th><th style="width:65px">单价</th><th style="width:75px">合计</th><th style="width:70px">备注</th><th style="width:35px"></th></tr></thead><tbody id="quoteBody"></tbody></table></div>
      <button class="btn btn-outline btn-block" onclick="addRow()">+ 添加产品</button>
      <div class="total-bar"><span>合计</span><span class="big" id="quoteTotal">¥0.00</span></div>
      <button class="btn btn-blue btn-block" onclick="genQuote()">📋 生成报价单</button>
    </div>

    <!-- 详情 -->
    <div id="tab-detail" class="hidden">
      <div class="card"><h3 id="detailTitle" style="text-align:center"></h3></div>
      <div class="table-wrap"><table><thead><tr><th>序号</th><th>位置</th><th>产品</th><th>规格</th><th>颜色</th><th>玻璃</th><th>面积</th><th>数量</th><th>单价</th><th>合计</th><th>备注</th></tr></thead><tbody id="detailBody"></tbody></table></div>
      <div class="total-bar"><span>合计</span><span class="big" id="detailTotal"></span></div>
      <button class="btn btn-blue btn-block" onclick="saveQuote()">💾 保存报价单</button>
      <button class="btn btn-outline btn-block" onclick="exportCSV()">📊 导出表格</button>
      <button class="btn btn-gray btn-block" onclick="switchTab('quote',document.querySelector('.menu span'))">↩ 返回修改</button>
    </div>

    <!-- 历史 -->
    <div id="tab-history" class="hidden"><div id="historyList"></div></div>

    <!-- 管理后台 -->
    <div id="tab-admin" class="hidden">
      <div class="menu" style="margin-bottom:12px">
        <span class="active" onclick="switchAdminTab('product',this)">产品类型</span>
        <span onclick="switchAdminTab('color',this)">颜色管理</span>
        <span onclick="switchAdminTab('user',this)" id="adminUserTab">用户管理</span>
        <span onclick="switchAdminTab('setting',this)">系统设置</span>
      </div>
      <div id="atab-product">
        <button class="btn btn-blue btn-sm" onclick="addType()">+ 新增产品</button>
        <div id="typeList" style="margin-top:10px"></div>
      </div>
      <div id="atab-color" class="hidden">
        <div class="row"><input id="newColor" placeholder="颜色名，如：古铜色"><button class="btn btn-blue btn-sm" onclick="addColor()">添加</button></div>
        <div id="colorList" class="color-tags" style="margin-top:10px"></div>
      </div>
      <div id="atab-user" class="hidden">
        <div class="card"><h3>新增用户</h3><div class="row"><input id="newUserName" placeholder="账号"><input id="newUserPwd" type="password" placeholder="密码"><button class="btn btn-blue btn-sm" onclick="addUser()">创建</button></div></div>
        <div class="card"><h3>用户管理</h3><div id="userList"></div></div>
      </div>
      <div id="atab-setting" class="hidden">
        <div class="card"><h3>报价表标题</h3><div class="row"><input id="setTitle" placeholder="门窗报价表"><button class="btn btn-blue btn-sm" onclick="saveTitle()">保存</button></div></div>
        <div class="card"><h3>同步设置</h3><div style="font-size:12px;color:#999;margin-bottom:8px">填入GitHub令牌后，多设备数据实时同步</div><div class="row"><input id="setToken" placeholder="GitHub Token（ghp_开头）"><button class="btn btn-blue btn-sm" onclick="saveToken()">保存</button></div></div>
        <div class="card" id="adminPwdCard"><h3>修改管理员密码</h3><div class="row"><input id="setPwd1" type="password" placeholder="新密码"><input id="setPwd2" type="password" placeholder="确认"><button class="btn btn-blue btn-sm" onclick="changePwd()">修改</button></div></div>
      </div>
    </div>
  </div>
</div>

<!-- 产品编辑弹窗 -->
<div class="overlay" id="typeDlg"><div class="dialog">
  <span class="close" onclick="closeDlg('typeDlg')">✕</span>
  <h3 id="typeDlgTitle">新增产品</h3>
  <div class="row"><label>名称</label><input id="tName"></div>
  <div class="row"><label>玻璃</label><input id="tGlass" placeholder="可为空"></div>
  <div class="row"><label>颜色</label><input id="tColor" placeholder="可为空"></div>
  <div class="row"><label>单价</label><input id="tPrice" type="number" placeholder="420"></div>
  <div class="row"><label>最低㎡</label><input id="tMinArea" type="number" placeholder="0=不限"></div>
  <div class="row"><label>公式</label><input id="tFormula" placeholder="计费面积*单价*数量"></div>
  <div style="font-size:11px;color:#999">变量：面积 / 计费面积 / 单价 / 数量</div>
  <button class="btn btn-blue btn-block" style="margin-top:10px" onclick="saveType()">保存</button>
</div></div>

<script>
const DEF={
  users:[{username:'admin',password:'123456',role:'admin',active:true}],
  types:[
    {id:1,name:'推拉窗',defaultGlass:'5+12A+5',defaultColor:'深灰',formula:'计费面积*单价*数量',defaultPrice:420,minArea:1.5},
    {id:2,name:'平开窗',defaultGlass:'5+12A+5',defaultColor:'深灰',formula:'计费面积*单价*数量',defaultPrice:450,minArea:1.5},
    {id:3,name:'折叠窗',defaultGlass:'5+12A+5',defaultColor:'白色',formula:'计费面积*单价*数量',defaultPrice:520,minArea:0},
    {id:4,name:'平开门',defaultGlass:'',defaultColor:'白色',formula:'单价*数量',defaultPrice:2500,minArea:0},
    {id:5,name:'推拉门',defaultGlass:'5+12A+5',defaultColor:'白色',formula:'计费面积*单价*数量',defaultPrice:480,minArea:2},
    {id:6,name:'阳光房',defaultGlass:'8mm',defaultColor:'透明',formula:'计费面积*单价*数量',defaultPrice:680,minArea:0},
    {id:7,name:'运费',defaultGlass:'',defaultColor:'',formula:'单价*数量',defaultPrice:1,minArea:0}
  ],
  colors:['深灰','白色','透明','咖啡','黑色','香槟','砂纹黑','砂纹白'],
  title:'门窗报价表'
};
function L(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function S(k,v){localStorage.setItem(k,JSON.stringify(v))}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fm(n){return Number(n||0).toFixed(2)}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

let users=[],types=[],colors=[],title='';
let cur=null,rows=[],etId=null;
const GH_RAW='https://raw.githubusercontent.com/zhanghua-svg/door-quote-web/main/users.json';
const GH_API='https://api.github.com/repos/zhanghua-svg/door-quote-web/contents/users.json';
let ghToken=L('w_ghtoken','');

// 从GitHub拉取最新用户数据
function syncUsers(cb){
  fetch(GH_RAW+'?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    if(data&&data.users){users=data.users;users.forEach(function(u){if(u.active===undefined)u.active=true});S('w_users',users)}
    cb()
  }).catch(function(){users=L('w_users',DEF.users);cb()})
}

// 推送用户数据到GitHub
function pushUsers(cb){
  if(!ghToken){S('w_users',users);if(cb)cb();return}
  fetch(GH_API,{headers:{Authorization:'token '+ghToken}}).then(function(r){return r.json()}).then(function(d){
    var body={message:'更新用户数据',content:btoa(unescape(encodeURIComponent(JSON.stringify({users:users}))))};
    if(d.sha)body.sha=d.sha;
    return fetch(GH_API,{method:'PUT',headers:{Authorization:'token '+ghToken,'Content-Type':'application/json'},body:JSON.stringify(body)})
  }).then(function(){S('w_users',users);if(cb)cb()}).catch(function(){S('w_users',users);if(cb)cb()})
}

function calc(f,a,p,q,m){var e=Math.max(a||0,m||0);try{var x=f.replace(/计费面积/g,String(e)).replace(/面积/g,String(a||0)).replace(/单价/g,String(p||0)).replace(/数量/g,String(q||0));if(!/^[\d\s+\-*/.()]+$/.test(x))return a*p*q;return Math.round(Function('"use strict";return ('+x+')')()*100)/100}catch(c){return a*p*q}}

function doLogin(){var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPwd').value;
// 先尝试本地数据登录（本机改了密码不会丢）
var localUsers=L('w_users',[]);
var localMatch=localUsers.find(function(z){return z.username===u&&z.password===p});
if(localMatch){doLoginSuccess(localMatch);return}
// 本地不对，从GitHub拉最新数据再试
syncUsers(function(){
  var x=users.find(function(z){return z.username===u&&z.password===p});
  if(!x){alert('账号或密码错误');return}
  S('w_users',users);
  doLoginSuccess(x)
})}
function doLoginSuccess(x){
  cur=x;
  document.getElementById('loginPage').style.display='none';document.getElementById('mainPage').classList.add('show');document.getElementById('topUser').textContent=(x.role==='admin'?'👑 ':'')+x.username;
document.getElementById('adminMenu').classList.remove('hidden');
document.getElementById('topTitle').textContent=title;
document.getElementById('adminUserTab').classList.toggle('hidden',x.role!=='admin');
document.getElementById('adminPwdCard').classList.toggle('hidden',x.role!=='admin');
if(x.active===false){alert('该账号已被停用，请联系管理员');logout();return}
loadUD();
switchTab('quote',document.querySelector('.menu span'))
}
function logout(){cur=null;rows=[];document.getElementById('loginPage').style.display='flex';document.getElementById('mainPage').classList.remove('show');document.getElementById('loginPwd').value=''}

function switchTab(n,el){document.querySelectorAll('.menu>span').forEach(function(s){s.classList.remove('active')});if(el)el.classList.add('active');['quote','detail','history','admin'].forEach(function(t){document.getElementById('tab-'+t).classList.add('hidden')});document.getElementById('tab-'+n).classList.remove('hidden');if(n==='quote')rq();if(n==='history')rh();if(n==='admin')ra()}
function switchAdminTab(n,el){document.querySelectorAll('#tab-admin .menu span').forEach(function(s){s.classList.remove('active')});if(el)el.classList.add('active');['product','color','user','setting'].forEach(function(t){document.getElementById('atab-'+t).classList.add('hidden')});document.getElementById('atab-'+n).classList.remove('hidden');if(n==='product')rt();if(n==='color')rc();if(n==='user')ru();if(n==='setting')document.getElementById('setTitle').value=title}

function addRow(){rows.push({id:id(),position:'',productType:'',width:'',height:'',color:'',glass:'',area:'',quantity:1,unitPrice:'',total:'',remark:'',_seq:''});rq()}
function rq(){document.getElementById('quoteBody').innerHTML=rows.map(function(r,i){return'<tr><td>'+r._seq+'</td><td><input value="'+es(r.position)+'" onchange="u('+i+',\'position\',this.value)"></td><td><select onchange="ot('+i+',this.value)"><option value="">选择▼</option>'+types.map(function(t){return'<option value="'+es(t.name)+'"'+(r.productType===t.name?' selected':'')+'>'+t.name+'</option>'}).join('')+'</select></td><td style="display:flex;gap:2px"><input type="number" value="'+r.width+'" onchange="u('+i+',\'width\',this.value)" style="width:50%"><span>×</span><input type="number" value="'+r.height+'" onchange="u('+i+',\'height\',this.value)" style="width:50%"></td><td><select onchange="u('+i+',\'color\',this.value)"><option value="">选色</option>'+colors.map(function(c){return'<option value="'+es(c)+'"'+(r.color===c?' selected':'')+'>'+c+'</option>'}).join('')+'</select><input value="'+es(r.color)+'" onchange="u('+i+',\'color\',this.value)"></td><td><input value="'+es(r.glass)+'" onchange="u('+i+',\'glass\',this.value)"></td><td>'+r.area+'</td><td><input type="number" value="'+r.quantity+'" onchange="u('+i+',\'quantity\',this.value)" style="width:40px"></td><td><input type="number" value="'+r.unitPrice+'" onchange="u('+i+',\'unitPrice\',this.value)"></td><td><b>'+r.total+'</b></td><td><input value="'+es(r.remark)+'" onchange="u('+i+',\'remark\',this.value)"></td><td class="del-col" onclick="dr('+i+')">✕</td></tr>'}).join('');rc2()}
function u(i,f,v){rows[i][f]=v;if(f==='width'||f==='height')aa(i);at(i);rc2()}
function ot(i,n){var t=types.find(function(x){return x.name===n});if(!t)return;rows[i].productType=n;rows[i].glass=t.defaultGlass||'';rows[i].color=t.defaultColor||'';rows[i].unitPrice=String(t.defaultPrice||'');rq();aa(i);at(i);rc2()}
function aa(i){var w=parseFloat(rows[i].width),h=parseFloat(rows[i].height);rows[i].area=(w>0&&h>0)?Math.round(w*h/1e6*100)/100:'';rq()}
function at(i){var r=rows[i],a=parseFloat(r.area)||0,p=parseFloat(r.unitPrice)||0,q=parseFloat(r.quantity)||0,t=types.find(function(x){return x.name===r.productType});r.total=calc(t?t.formula:'计费面积*单价*数量',a,p,q,t?t.minArea:0);rq()}
function dr(i){if(confirm('删除？')){rows.splice(i,1);rq();rc2()}}
function rc2(){var pm={};rows.forEach(function(r){var p=(r.position||'').trim();if(!p){r._seq='';return}if(!pm[p])pm[p]=Object.keys(pm).length+1;r._seq=pm[p]});var s=0;rows.forEach(function(r){s+=parseFloat(r.total)||0});document.getElementById('quoteTotal').textContent='¥'+fm(s);rq()}

function genQuote(){if(!rows.length){alert('请添加产品');return}document.getElementById('detailTitle').textContent=title;document.getElementById('detailBody').innerHTML=rows.map(function(r){return'<tr><td>'+(r._seq||'')+'</td><td>'+es(r.position)+'</td><td>'+es(r.productType)+'</td><td>'+r.width+'×'+r.height+'</td><td>'+es(r.color)+'</td><td>'+es(r.glass)+'</td><td>'+r.area+'</td><td>'+r.quantity+'</td><td>¥'+r.unitPrice+'</td><td>¥'+r.total+'</td><td>'+es(r.remark)+'</td></tr>'}).join('');var s=0;rows.forEach(function(r){s+=parseFloat(r.total)||0});document.getElementById('detailTotal').textContent='¥'+fm(s);switchTab('detail',null)}
function saveQuote(){var s=0;rows.forEach(function(r){s+=parseFloat(r.total)||0});var q={_id:Date.now().toString(),title:title,projectName:document.getElementById('qProject').value,customerName:document.getElementById('qName').value,customerPhone:document.getElementById('qPhone').value,items:rows.map(function(r){return JSON.parse(JSON.stringify(r))}),finalTotal:s,createTime:Date.now()};var a=L('w_quotes_'+cur.username,[]);a.unshift(q);S('w_quotes_'+cur.username,a);alert('保存成功！');switchTab('history',document.querySelectorAll('.menu span')[1])}
function exportCSV(){var c='\uFEFF序号,位置,产品,宽,高,颜色,玻璃,面积,数量,单价,合计,备注\n';rows.forEach(function(r){c+=[r._seq||'',r.position||'',r.productType||'',r.width||'',r.height||'',r.color||'',r.glass||'',r.area||'',r.quantity||'',r.unitPrice||'',r.total||'',r.remark||''].join(',')+'\n'});var s=0;rows.forEach(function(r){s+=parseFloat(r.total)||0});c+='\n,,,,,,,,,合计,'+s;navigator.clipboard.writeText(c).then(function(){alert('已复制！打开WPS/Excel粘贴')}).catch(function(){alert('复制失败')})}

function rh(){var a=L('w_quotes_'+cur.username,[]),d=document.getElementById('historyList');if(!a.length){d.innerHTML='<div style="text-align:center;padding:40px;color:#999">暂无记录</div>';return}d.innerHTML=a.map(function(q,i){return'<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div onclick="vh('+i+')" style="flex:1;cursor:pointer"><div style="font-weight:600">'+es(q.projectName||'未命名')+'</div><div style="font-size:12px;color:#999">'+new Date(q.createTime).toLocaleDateString()+' | '+(q.items||[]).length+'项 | '+es(q.customerName||'')+'</div></div><div style="font-size:18px;font-weight:700;color:#e74c3c;margin-right:10px">¥'+fm(q.finalTotal)+'</div><span style="cursor:pointer;font-size:20px;opacity:0.5" onclick="dh('+i+')">🗑️</span></div>'}).join('')}
function vh(i){var q=L('w_quotes_'+cur.username,[])[i];if(!q)return;document.getElementById('qProject').value=q.projectName||'';document.getElementById('qName').value=q.customerName||'';document.getElementById('qPhone').value=q.customerPhone||'';rows=(q.items||[]).map(function(r){r.id=r.id||id();return r});rq();switchTab('quote',document.querySelector('.menu span'))}
function dh(i){if(!confirm('删除？'))return;var a=L('w_quotes_'+cur.username,[]);a.splice(i,1);S('w_quotes_'+cur.username,a);rh()}

function ra(){rt();rc();ru();document.getElementById('setTitle').value=title}
function rt(){document.getElementById('typeList').innerHTML=types.map(function(t){return'<div class="type-row"><div class="info"><div class="tname">'+es(t.name)+'</div><div class="tmeta">'+(t.defaultGlass?'<span>玻璃:'+es(t.defaultGlass)+'</span>':'')+(t.defaultColor?'<span>颜色:'+es(t.defaultColor)+'</span>':'')+(t.minArea>0?'<span>最低:'+t.minArea+'㎡</span>':'')+'<span>公式:'+es(t.formula)+'</span><span>¥'+t.defaultPrice+'</span></div></div><div><button class="btn btn-blue btn-sm" onclick="et(\''+t.id+'\')">编辑</button><button class="btn btn-red btn-sm gap" onclick="dt(\''+t.id+'\')">删除</button></div></div>'}).join('')}
function addType(){etId=null;document.getElementById('typeDlgTitle').textContent='新增产品';['tName','tGlass','tColor','tPrice','tMinArea','tFormula'].forEach(function(x){document.getElementById(x).value=''});document.getElementById('tFormula').value='计费面积*单价*数量';document.getElementById('tMinArea').value='0';document.getElementById('typeDlg').classList.add('show')}
function et(id){var t=types.find(function(x){return x.id===id});if(!t)return;etId=id;document.getElementById('typeDlgTitle').textContent='编辑产品';document.getElementById('tName').value=t.name;document.getElementById('tGlass').value=t.defaultGlass||'';document.getElementById('tColor').value=t.defaultColor||'';document.getElementById('tPrice').value=t.defaultPrice;document.getElementById('tMinArea').value=t.minArea||0;document.getElementById('tFormula').value=t.formula;document.getElementById('typeDlg').classList.add('show')}
function saveType(){var n=document.getElementById('tName').value.trim();if(!n){alert('请输入名称');return}var o={id:etId||id(),name:n,defaultGlass:document.getElementById('tGlass').value.trim(),defaultColor:document.getElementById('tColor').value.trim(),defaultPrice:parseFloat(document.getElementById('tPrice').value)||0,minArea:parseFloat(document.getElementById('tMinArea').value)||0,formula:document.getElementById('tFormula').value.trim()||'计费面积*单价*数量'};if(etId){var i=types.findIndex(function(x){return x.id===etId});if(i>-1)types[i]=o}else types.push(o);saveTypes();closeDlg('typeDlg');rt()}
function dt(id){if(!confirm('删除？'))return;types=types.filter(function(x){return x.id!==id});saveTypes();rt()}
function rc(){document.getElementById('colorList').innerHTML=colors.map(function(c){return'<span class="color-tag">'+es(c)+'<span class="del" onclick="dc(\''+es(c)+'\')">✕</span></span>'}).join('')}
function addColor(){var c=document.getElementById('newColor').value.trim();if(!c)return;if(colors.includes(c)){alert('已存在');return}colors.push(c);saveColors();document.getElementById('newColor').value='';rc()}
function dc(c){colors=colors.filter(function(x){return x!==c});saveColors();rc()}
function ru(){document.getElementById('userList').innerHTML=users.map(function(u){var s=u.active===false?' (已停用)':'';return'<div class="user-row"><div><span class="uname">'+es(u.username)+'</span><span class="umeta" style="margin-left:8px">'+(u.role==='admin'?'管理员':'普通用户')+s+'</span></div><div>'+(u.username!=='admin'?'<button class="btn btn-blue btn-sm" onclick="rp(\''+u.username+'\')">重置密码</button><button class="btn '+(u.active===false?'btn-blue':'btn-red')+' btn-sm gap" onclick="tu(\''+u.username+'\')">'+(u.active===false?'启用':'停用')+'</button><button class="btn btn-red btn-sm gap" onclick="du(\''+u.username+'\')">删除</button>':'')+'</div></div>'}).join('')}
function addUser(){var u=document.getElementById('newUserName').value.trim(),p=document.getElementById('newUserPwd').value;if(!u||!p){alert('请填写账号和密码');return}if(users.find(function(x){return x.username===u})){alert('账号已存在');return}users.push({username:u,password:p,role:'user',active:true});pushUsers(function(){document.getElementById('newUserName').value='';document.getElementById('newUserPwd').value='';ru()})}
function rp(u){var p=prompt('为 '+u+' 设置新密码（至少4位）');if(!p||p.length<4){alert('密码至少4位');return}var i=users.findIndex(function(x){return x.username===u});if(i>-1){users[i].password=p;pushUsers(function(){alert('密码已重置')})}}
function tu(u){var i=users.findIndex(function(x){return x.username===u});if(i>-1){users[i].active=users[i].active===false?true:false;pushUsers(function(){ru()})}}
function du(u){if(u==='admin'){alert('不能删除管理员');return}if(!confirm('删除用户 '+u+'？'))return;users=users.filter(function(x){return x.username!==u});pushUsers(function(){ru()})}
function loadUD(){types=L('w_types_'+cur.username,DEF.types);colors=L('w_colors_'+cur.username,DEF.colors);title=L('w_title_'+cur.username,DEF.title);document.getElementById('topTitle').textContent=title}
function saveTypes(){S('w_types_'+cur.username,types)}
function saveColors(){S('w_colors_'+cur.username,colors)}
function saveTitle(){title=document.getElementById('setTitle').value.trim()||'门窗报价表';S('w_title_'+cur.username,title);document.getElementById('topTitle').textContent=title;alert('已保存')}
function changePwd(){var a=document.getElementById('setPwd1').value,b=document.getElementById('setPwd2').value;if(!a||a.length<4){alert('密码至少4位');return}if(a!==b){alert('两次不一致');return}var i=users.findIndex(function(x){return x.username==='admin'});if(i>-1)users[i].password=a;pushUsers(function(){document.getElementById('setPwd1').value='';document.getElementById('setPwd2').value='';alert('密码已修改')})}
function saveToken(){ghToken=document.getElementById('setToken').value.trim();S('w_ghtoken',ghToken);alert('令牌已保存')}
function closeDlg(id){document.getElementById(id).classList.remove('show')}
</script>
