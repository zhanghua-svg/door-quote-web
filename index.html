<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>门窗报价系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#2c3e50;font-size:14px}
.container{max-width:100vw;overflow-x:hidden;padding:10px;min-height:100vh}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;text-align:center;cursor:pointer;margin:8px 0}
.btn-primary{background:#2980b9;color:#fff}
.btn-outline{background:#fff;color:#2980b9;border:2px solid #2980b9}
.btn-danger{background:#e74c3c;color:#fff}
.btn-small{padding:8px 16px;font-size:13px;display:inline-block;width:auto}
.card{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px}
.input-group{display:flex;align-items:center;margin-bottom:10px}
.input-group label{width:80px;font-size:13px;color:#666;flex-shrink:0}
.input-group input, .input-group select{flex:1;height:36px;border:1px solid #ddd;border-radius:6px;padding:0 8px;font-size:13px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{width:100%;max-height:85vh;background:#fff;border-radius:16px 16px 0 0;overflow-y:auto;padding:20px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:17px}
.modal-close{font-size:22px;color:#999;cursor:pointer}

.header{text-align:center;padding:15px 0 8px}
.header h2{font-size:20px;font-weight:700}
.admin-link{font-size:22px;color:#2980b9;cursor:pointer;margin-left:10px;text-decoration:underline;font-weight:700;cursor:pointer;margin-left:8px}

.info-bar{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0 15px;font-size:13px}
.info-item{display:flex;align-items:center;flex:1;min-width:150px}
.info-item span{color:#666;white-space:nowrap;font-size:12px;margin-right:4px}
.info-item input{flex:1;border:none;border-bottom:1px solid #ddd;padding:5px 2px;font-size:13px}

.table-wrap{overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.table{min-width:950px;font-size:12px;border-collapse:collapse;width:100%}
.table th{background:#2980b9;color:#fff;padding:10px 5px;font-weight:600;font-size:12px;position:sticky;top:0;white-space:nowrap}
.table td{padding:8px 4px;text-align:center;border-bottom:1px solid #eee}
.table td input,.table td select{width:100%;text-align:center;border:1px solid transparent;padding:4px 2px;font-size:12px;background:transparent;min-width:50px}
.table td input:focus,.table td select:focus{border-color:#2980b9;background:#fafafa;border-radius:4px;outline:none}
.table tr:nth-child(even){background:#fafbfc}
.del-btn{color:#e74c3c;cursor:pointer;font-size:16px;font-weight:700}

.add-row{text-align:center;padding:14px;border:2px dashed #bdc3c7;border-radius:10px;color:#7f8c8d;cursor:pointer;margin-bottom:12px;background:#fff}

.summary{background:#fff;border-radius:10px;padding:15px;margin-bottom:15px}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
.summary-row.total{border-top:1px solid #eee;padding-top:12px;font-weight:700;font-size:16px}
.final-price{color:#e74c3c;font-size:22px;font-weight:700}
.discount-in{width:60px;text-align:right;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:14px}

/* 管理后台 */
.tabs{display:flex;background:#eee;border-radius:8px;padding:3px;margin-bottom:15px}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;border-radius:6px;cursor:pointer;color:#666}
.tab.active{background:#fff;color:#2c3e50;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}

.type-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.type-info{flex:1}
.type-name{font-size:15px;font-weight:600;margin-bottom:4px}
.type-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;color:#999}
.type-meta span{background:#f5f5f5;padding:2px 8px;border-radius:4px}
.type-acts{display:flex;gap:8px;flex-shrink:0;margin-left:10px}
.type-acts span{font-size:12px;padding:4px 10px;border-radius:4px;cursor:pointer}
.act-edit{color:#2980b9;background:#eaf4fd}
.act-del{color:#e74c3c;background:#fdeaea}

.color-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.color-tag{display:flex;align-items:center;gap:6px;padding:6px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:13px}
.color-del{color:#ccc;cursor:pointer;font-size:16px}

.login-box{max-width:300px;margin:80px auto;text-align:center}
.login-box input{width:100%;height:44px;border:2px solid #ddd;border-radius:10px;text-align:center;font-size:16px;margin:16px 0}
.pwd-tip{color:#e67e22;font-size:12px;margin-top:8px}

.history-card{display:flex;align-items:center;background:#fff;border-radius:10px;padding:15px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.history-info{flex:1;overflow:hidden}
.history-title{font-size:15px;font-weight:500;margin-bottom:4px}
.history-meta{font-size:12px;color:#999;margin-bottom:2px}
.history-price{font-size:18px;font-weight:700;color:#e74c3c}
.history-del{font-size:24px;padding:8px;opacity:0.5;cursor:pointer}
.history-del:hover{opacity:1}

body.admin-mode .app-page{display:none}
body.admin-mode .admin-page{display:block}
body.login-needed .admin-content{display:none}
body:not(.login-needed) .login-box{display:none}

.hidden{display:none!important}
.red{color:#e74c3c}
</style>
</head>
<body>

<div class="container" id="app">

<!-- ==================== 首页 ==================== -->
<div id="page-index">
  <div class="header">
    <h2 id="quoteTitle">门窗报价表 <span class="admin-link" onclick="showAdmin()">⚙️</span></h2>
  </div>

  <div class="info-bar">
    <div class="info-item"><span>工程名称：</span><input id="infoProject" placeholder="如：天楼16#201室"></div>
    <div class="info-item"><span>姓名：</span><input id="infoName" placeholder="客户姓名"></div>
    <div class="info-item"><span>电话：</span><input id="infoPhone" type="tel" placeholder="联系电话"></div>
  </div>

  <div id="rowsContainer" class="table-wrap">
    <table class="table">
      <thead><tr>
        <th style="width:40px">序号</th>
        <th style="width:80px">安装位置</th>
        <th style="width:100px">产品类型</th>
        <th style="width:130px">宽×高(mm)</th>
        <th style="width:70px">颜色</th>
        <th style="width:90px">玻璃</th>
        <th style="width:60px">面积</th>
        <th style="width:50px">数量</th>
        <th style="width:70px">单价</th>
        <th style="width:80px">合计</th>
        <th style="width:70px">备注</th>
        <th style="width:40px"></th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div id="emptyHint" class="add-row" onclick="addRow()">+ 添加产品</div>

  <div id="summaryBox" class="summary hidden">
    <div class="summary-row"><span>小计</span><span id="sumSubtotal">¥0</span></div>
    <div class="summary-row"><span>折扣(%)</span><input class="discount-in" id="discountInput" value="100" onchange="recalcAll()"></div>
    <div class="summary-row total"><span>合计</span><span class="final-price" id="sumTotal">¥0</span></div>
  </div>

  <button id="genQuoteBtn" class="btn btn-primary hidden" onclick="goDetail()">📋 生成报价单</button>
</div>

<!-- ==================== 详情页 ==================== -->
<div id="page-detail" class="hidden">
  <div style="text-align:center;padding:20px 0"><h2 id="detailTitle"></h2></div>
  <div class="info-bar">
    <span>工程：<b id="dProject"></b></span>
    <span>姓名：<b id="dName"></b></span>
    <span>电话：<b id="dPhone"></b></span>
  </div>
  <div class="table-wrap">
    <table class="table">
      <thead><tr>
        <th>序号</th><th>位置</th><th>产品</th><th>规格(mm)</th><th>颜色</th><th>玻璃</th><th>面积</th><th>数量</th><th>单价</th><th>合计</th><th>备注</th>
      </tr></thead>
      <tbody id="detailBody"></tbody>
    </table>
  </div>
  <div class="summary"><div class="summary-row total">合计：<span class="final-price" id="dTotal"></span></div></div>
  <button class="btn btn-primary" onclick="saveQuote()">💾 保存报价单</button>
  <button class="btn btn-outline" onclick="exportCSV()">📊 导出表格</button>
  <button class="btn btn-outline" onclick="goBack()">↩ 返回修改</button>
</div>

<!-- ==================== 历史页 ==================== -->
<div id="page-history" class="hidden">
  <div class="header"><h2>📚 历史报价单</h2></div>
  <div id="historyList"></div>
  <button class="btn btn-outline" onclick="showPage('index')">🏠 返回首页</button>
</div>

<!-- ==================== 管理后台 ==================== -->
<div id="page-admin" class="hidden">
  <div class="login-box" id="loginBox">
    <h3>🔒 管理后台</h3>
    <input type="password" id="pwdInput" placeholder="请输入密码">
    <button class="btn btn-primary" onclick="adminLogin()">登录</button>
    <div class="pwd-tip">默认密码：123456</div>
  </div>

  <div id="adminContent" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>⚙️ 管理后台</h3>
      <span style="color:#e74c3c;cursor:pointer;font-size:13px" onclick="adminLogout()">退出</span>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchAdminTab('product',this)">产品类型</div>
      <div class="tab" onclick="switchAdminTab('color',this)">颜色管理</div>
      <div class="tab" onclick="switchAdminTab('setting',this)">系统设置</div>
    </div>

    <!-- 产品类型 -->
    <div id="atab-product">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span>产品类型 (<span id="typeCount">0</span>)</span>
        <span class="btn-small btn-primary" onclick="addType()">+ 新增</span>
      </div>
      <div id="typeList"></div>
    </div>

    <!-- 颜色 -->
    <div id="atab-color" class="hidden">
      <div style="margin-bottom:10px"><span class="btn-small btn-primary" onclick="addColorBtn()">+ 新增颜色</span></div>
      <div id="colorList" class="color-tags"></div>
    </div>

    <!-- 设置 -->
    <div id="atab-setting" class="hidden">
      <div class="card">
        <div class="card-title">报价表标题</div>
        <div class="input-group"><input id="setTitle" placeholder="如：新标门窗报价表"></div>
        <button class="btn-small btn-primary" onclick="saveSetting()">保存标题</button>
      </div>
      <div class="card">
        <div class="card-title">修改密码</div>
        <div class="input-group"><label>新密码</label><input type="password" id="setPwd1" placeholder="至少4位"></div>
        <div class="input-group"><label>确认</label><input type="password" id="setPwd2" placeholder="再次输入"></div>
        <button class="btn-small btn-primary" onclick="changePwd()">修改密码</button>
      </div>
      <div class="card"><button class="btn btn-danger" onclick="resetAll()">🔄 恢复全部默认</button></div>
    </div>

    <button class="btn btn-outline" style="margin-top:15px" onclick="showPage('index')">🏠 返回首页</button>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="typeModal">
  <div class="modal">
    <div class="modal-header"><h3 id="typeModalTitle">新增产品类型</h3><span class="modal-close" onclick="closeModal('typeModal')">✕</span></div>
    <div class="input-group"><label>名称</label><input id="tName" placeholder="如：推拉窗"></div>
    <div class="input-group"><label>默认玻璃</label><input id="tGlass" placeholder="可为空"></div>
    <div class="input-group"><label>默认颜色</label><input id="tColor" placeholder="可为空"></div>
    <div class="input-group"><label>默认单价</label><input id="tPrice" type="number" placeholder="420"></div>
    <div class="input-group"><label>最低平方</label><input id="tMinArea" type="number" placeholder="0=不限，1.5=不足1.5㎡按1.5计"></div>
    <div class="input-group"><label>计价公式</label><input id="tFormula" placeholder="计费面积*单价*数量"></div>
    <div style="font-size:11px;color:#999;line-height:1.8">
      变量：面积 / 计费面积 / 单价 / 数量<br>
      计费面积 = max(实际面积, 最低平方)
    </div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="saveType()">保存</button>
  </div>
</div>

<div class="modal-overlay" id="colorModal">
  <div class="modal">
    <div class="modal-header"><h3>新增颜色</h3><span class="modal-close" onclick="closeModal('colorModal')">✕</span></div>
    <div class="input-group"><label>颜色名</label><input id="cName" placeholder="如：古铜色"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="saveColor()">确定</button>
  </div>
</div>

</div><!-- end container -->

<script>
// ==================== 数据层 ====================
const DEF = {
  types: [
    {id:1,name:'推拉窗',defaultGlass:'5+12A+5',defaultColor:'深灰',formula:'计费面积*单价*数量',defaultPrice:420,minArea:1.5},
    {id:2,name:'平开窗',defaultGlass:'5+12A+5',defaultColor:'深灰',formula:'计费面积*单价*数量',defaultPrice:450,minArea:1.5},
    {id:3,name:'折叠窗',defaultGlass:'5+12A+5',defaultColor:'白色',formula:'计费面积*单价*数量',defaultPrice:520,minArea:0},
    {id:4,name:'平开门',defaultGlass:'',defaultColor:'白色',formula:'单价*数量',defaultPrice:2500,minArea:0},
    {id:5,name:'推拉门',defaultGlass:'5+12A+5',defaultColor:'白色',formula:'计费面积*单价*数量',defaultPrice:480,minArea:2},
    {id:6,name:'阳光房',defaultGlass:'8mm',defaultColor:'透明',formula:'计费面积*单价*数量',defaultPrice:680,minArea:0},
    {id:7,name:'运费',defaultGlass:'',defaultColor:'',formula:'单价*数量',defaultPrice:1,minArea:0}
  ],
  colors: ['深灰','白色','透明','咖啡','黑色','香槟','砂纹黑','砂纹白'],
  pwd: '123456',
  title: '门窗报价表'
};

function load(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(n) { return Number(n).toFixed(2); }
function fmtDate(ts) { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

let types = load('ptypes', DEF.types);
let colors = load('pcolors', DEF.colors);
let pwd = load('ppwd', DEF.pwd);
let quoteTitle = load('ptitle', DEF.title);
let rows = [];
let editingTypeId = null;
let editSeq = 0;
let adminLoggedIn = false;

// ==================== 公式引擎 ====================
function calcByFormula(formula, area, unitPrice, qty, minArea) {
  const eff = Math.max(area||0, minArea||0);
  try {
    let expr = formula.replace(/计费面积/g, String(eff)).replace(/面积/g, String(area||0)).replace(/单价/g, String(unitPrice||0)).replace(/数量/g, String(qty||0));
    if (!/^[\d\s+\-*/.()]+$/.test(expr)) return area * unitPrice * qty;
    return Math.round(Function('"use strict";return ('+expr+')')() * 100) / 100;
  } catch(e) { return area * unitPrice * qty; }
}

// ==================== 页面导航 ====================
function showPage(name) {
  ['index','detail','history','admin'].forEach(p => document.getElementById('page-'+p).classList.toggle('hidden', p !== name));
  if (name === 'index') { renderRows(); recalcAll(); }
  if (name === 'history') renderHistory();
  if (name === 'admin') { document.getElementById('adminContent').classList.toggle('hidden', !adminLoggedIn); document.getElementById('loginBox').classList.toggle('hidden', adminLoggedIn); }
  document.getElementById('quoteTitle').textContent = quoteTitle;
}

function showAdmin() { showPage('admin'); }

// ==================== 首页-表格 ====================
function addRow() {
  rows.push({ id: genId(), position:'', productType:'', width:'', height:'', color:'', glass:'', area:'', quantity:1, unitPrice:'', total:'', remark:'', _seq:'' });
  renderRows();
}

function renderRows() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyHint');
  const summary = document.getElementById('summaryBox');
  const genBtn = document.getElementById('genQuoteBtn');
  tbody.innerHTML = '';

  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r._seq||''}</td>
      <td><input value="${esc(r.position)}" onchange="updateRow(${i},'position',this.value)" placeholder="位置"></td>
      <td>
        <select onchange="onTypeSelect(${i},this.value)">
          <option value="">选择▼</option>
          ${types.map(t => `<option value="${esc(t.name)}" ${r.productType===t.name?'selected':''}>${t.name}</option>`).join('')}
        </select>
      </td>
      <td style="display:flex;gap:2px">
        <input type="number" value="${r.width}" onchange="updateRow(${i},'width',this.value)" placeholder="宽" style="width:50%">
        <span>×</span>
        <input type="number" value="${r.height}" onchange="updateRow(${i},'height',this.value)" placeholder="高" style="width:50%">
      </td>
      <td>
        <select onchange="updateRow(${i},'color',this.value)">
          <option value="">选色▼</option>
          ${colors.map(c => `<option value="${esc(c)}" ${r.color===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <input value="${esc(r.color)}" onchange="updateRow(${i},'color',this.value)" placeholder="自定义" style="width:100%">
      </td>
      <td><input value="${esc(r.glass)}" onchange="updateRow(${i},'glass',this.value)" placeholder="玻璃"></td>
      <td>${r.area||''}</td>
      <td><input type="number" value="${r.quantity}" onchange="updateRow(${i},'quantity',this.value)" style="width:50px"></td>
      <td><input type="number" value="${r.unitPrice}" onchange="updateRow(${i},'unitPrice',this.value)" placeholder="单价"></td>
      <td><b>${r.total||''}</b></td>
      <td><input value="${esc(r.remark)}" onchange="updateRow(${i},'remark',this.value)" placeholder="备注"></td>
      <td><span class="del-btn" onclick="delRow(${i})">✕</span></td>`;
    tbody.appendChild(tr);
  });

  empty.classList.toggle('hidden', rows.length > 0);
  summary.classList.toggle('hidden', rows.length === 0);
  genBtn.classList.toggle('hidden', rows.length === 0);
}

function updateRow(i, field, val) {
  rows[i][field] = val;
  if (field === 'width' || field === 'height') autoArea(i);
  autoTotal(i);
  recalcAll();
}

function onTypeSelect(i, name) {
  const t = types.find(tp => tp.name === name);
  if (!t) return;
  rows[i].productType = name;
  rows[i].glass = t.defaultGlass || '';
  rows[i].color = t.defaultColor || '';
  rows[i].unitPrice = String(t.defaultPrice || '');
  renderRows();
  autoArea(i);
  autoTotal(i);
  recalcAll();
}

function autoArea(i) {
  const w = parseFloat(rows[i].width), h = parseFloat(rows[i].height);
  rows[i].area = (w > 0 && h > 0) ? Math.round((w * h / 1e6) * 100) / 100 : '';
  renderRows();
}

function autoTotal(i) {
  const r = rows[i];
  const area = parseFloat(r.area)||0, price = parseFloat(r.unitPrice)||0, qty = parseFloat(r.quantity)||0;
  const pt = types.find(t => t.name === r.productType);
  r.total = calcByFormula(pt ? pt.formula : '计费面积*单价*数量', area, price, qty, pt ? pt.minArea : 0);
  renderRows();
}

function delRow(i) { if (confirm('确定删除这行？')) { rows.splice(i,1); renderRows(); recalcAll(); } }

function recalcAll() {
  let sub = 0;
  rows.forEach(r => { sub += parseFloat(r.total)||0; });
  // compute seq
  const posMap = {}; let seq = 0;
  rows.forEach(r => { const p = (r.position||'').trim(); if (!p) { r._seq = ''; return; } if (!posMap[p]) { seq++; posMap[p] = seq; } r._seq = posMap[p]; });
  const disc = Math.min(100, Math.max(0, parseInt(document.getElementById('discountInput')?.value) || 100));
  const discAmt = Math.round(sub * (1 - disc / 100) * 100) / 100;
  document.getElementById('sumSubtotal').textContent = '¥' + fmt(sub);
  document.getElementById('sumTotal').textContent = '¥' + fmt(Math.round((sub - discAmt) * 100) / 100);
  renderRows();
}

// ==================== 详情页 ====================
function goDetail() {
  if (rows.length === 0) { alert('请先添加产品'); return; }
  const items = rows.map(r => ({ ...r }));
  const sub = rows.reduce((s,r) => s + (parseFloat(r.total)||0), 0);
  const disc = parseInt(document.getElementById('discountInput').value) || 100;
  const discAmt = Math.round(sub * (1 - disc / 100) * 100) / 100;
  const final = Math.round((sub - discAmt) * 100) / 100;

  document.getElementById('detailTitle').textContent = quoteTitle;
  document.getElementById('dProject').textContent = document.getElementById('infoProject').value;
  document.getElementById('dName').textContent = document.getElementById('infoName').value;
  document.getElementById('dPhone').textContent = document.getElementById('infoPhone').value;

  const tbody = document.getElementById('detailBody');
  tbody.innerHTML = items.map(r => `<tr>
    <td>${r._seq||''}</td><td>${esc(r.position)}</td><td>${esc(r.productType)}</td><td>${r.width}×${r.height}</td>
    <td>${esc(r.color)}</td><td>${esc(r.glass)}</td><td>${r.area}</td><td>${r.quantity}</td><td>¥${r.unitPrice}</td><td>¥${r.total}</td><td>${esc(r.remark)}</td>
  </tr>`).join('');
  document.getElementById('dTotal').textContent = '¥' + fmt(final);
  showPage('detail');
}

function saveQuote() {
  const q = {
    _id: Date.now().toString(),
    quoteTitle,
    projectName: document.getElementById('infoProject').value,
    customerName: document.getElementById('infoName').value,
    customerPhone: document.getElementById('infoPhone').value,
    items: rows.map(r => ({...r})),
    finalTotal: parseFloat(document.getElementById('dTotal').textContent.replace('¥','')),
    createTime: Date.now()
  };
  let quotes = load('quotes', []);
  quotes.unshift(q);
  save('quotes', quotes);
  alert('保存成功！');
  goBack();
}

function exportCSV() {
  const qTitle = quoteTitle;
  let csv = '\uFEFF序号,安装位置,产品类型,宽(mm),高(mm),颜色,玻璃,面积(㎡),数量,单价(元),合计(元),备注\n';
  rows.forEach(r => { csv += [r._seq||'', r.position||'', r.productType||'', r.width||'', r.height||'', r.color||'', r.glass||'', r.area||'', r.quantity||'', r.unitPrice||'', r.total||'', r.remark||''].join(',') + '\n'; });
  csv += `\n,,,,,,,,小计,,${document.getElementById('sumSubtotal').textContent}`;
  csv += `\n,,,,,,,,合计,,${document.getElementById('sumTotal').textContent}`;
  navigator.clipboard.writeText(csv).then(() => alert('已复制到剪贴板！\n打开WPS/Excel → 粘贴即可')).catch(() => alert('复制失败，请重试'));
}

function goBack() { showPage('index'); }

// ==================== 历史页 ====================
function renderHistory() {
  const quotes = load('quotes', []);
  const div = document.getElementById('historyList');
  if (quotes.length === 0) {
    div.innerHTML = '<div style="text-align:center;padding:60px 0;color:#999">暂无记录</div>';
    return;
  }
  div.innerHTML = quotes.map((q, i) => `
    <div class="history-card">
      <div class="history-info" onclick="viewHistory(${i})">
        <div class="history-title">${esc(q.projectName||'未命名')} - ${esc(q.quoteTitle||'报价单')}</div>
        <div class="history-meta">${fmtDate(q.createTime)} | ${(q.items||[]).length} 项 | ${esc(q.customerName||'')}</div>
      </div>
      <div class="history-price">¥${fmt(q.finalTotal||0)}</div>
      <span class="history-del" onclick="delHistory(${i})">🗑️</span>
    </div>`).join('');
}

function viewHistory(i) {
  const q = load('quotes', [])[i];
  if (!q) return;
  document.getElementById('infoProject').value = q.projectName || '';
  document.getElementById('infoName').value = q.customerName || '';
  document.getElementById('infoPhone').value = q.customerPhone || '';
  rows = (q.items || []).map(r => ({ ...r, id: r.id || genId() }));
  recalcAll();
  showPage('index');
}

function delHistory(i) {
  if (!confirm('确定删除这个记录？')) return;
  let quotes = load('quotes', []); quotes.splice(i, 1); save('quotes', quotes); renderHistory();
}

// ==================== 管理后台 ====================
function adminLogin() {
  if (document.getElementById('pwdInput').value === pwd) { adminLoggedIn = true; document.getElementById('adminContent').classList.remove('hidden'); document.getElementById('loginBox').classList.add('hidden'); refreshAdmin(); }
  else alert('密码错误');
}
function adminLogout() { adminLoggedIn = false; document.getElementById('adminContent').classList.add('hidden'); document.getElementById('loginBox').classList.remove('hidden'); }

function refreshAdmin() {
  document.getElementById('typeCount').textContent = types.length;
  document.getElementById('setTitle').value = quoteTitle;
  renderTypeList();
  renderColorList();
}

function switchAdminTab(name, el) {
  document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['product','color','setting'].forEach(t => document.getElementById('atab-'+t).classList.toggle('hidden', t !== name));
}

function renderTypeList() {
  document.getElementById('typeList').innerHTML = types.map(t => `
    <div class="type-card">
      <div class="type-info">
        <div class="type-name">${esc(t.name)}</div>
        <div class="type-meta">
          ${t.defaultGlass ? '<span>玻璃:'+esc(t.defaultGlass)+'</span>' : ''}
          ${t.defaultColor ? '<span>颜色:'+esc(t.defaultColor)+'</span>' : ''}
          ${t.minArea > 0 ? '<span>最低:'+t.minArea+'㎡</span>' : ''}
          <span>公式:${esc(t.formula)}</span>
          <span>单价:¥${t.defaultPrice}</span>
        </div>
      </div>
      <div class="type-acts">
        <span class="act-edit" onclick="editType('${t.id}')">编辑</span>
        <span class="act-del" onclick="delType('${t.id}')">删除</span>
      </div>
    </div>`).join('');
}

function addType() {
  editingTypeId = null;
  document.getElementById('typeModalTitle').textContent = '新增产品类型';
  ['tName','tGlass','tColor','tPrice','tMinArea','tFormula'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('tFormula').value = '计费面积*单价*数量';
  document.getElementById('tMinArea').value = '0';
  showModal('typeModal');
}

function editType(id) {
  const t = types.find(tp => tp.id === id);
  if (!t) return;
  editingTypeId = id;
  document.getElementById('typeModalTitle').textContent = '编辑产品类型';
  document.getElementById('tName').value = t.name;
  document.getElementById('tGlass').value = t.defaultGlass||'';
  document.getElementById('tColor').value = t.defaultColor||'';
  document.getElementById('tPrice').value = t.defaultPrice||'';
  document.getElementById('tMinArea').value = t.minArea||0;
  document.getElementById('tFormula').value = t.formula;
  showModal('typeModal');
}

function saveType() {
  const name = document.getElementById('tName').value.trim();
  if (!name) { alert('请输入名称'); return; }
  const item = {
    id: editingTypeId || genId(),
    name,
    defaultGlass: document.getElementById('tGlass').value.trim(),
    defaultColor: document.getElementById('tColor').value.trim(),
    defaultPrice: parseFloat(document.getElementById('tPrice').value)||0,
    minArea: parseFloat(document.getElementById('tMinArea').value)||0,
    formula: document.getElementById('tFormula').value.trim() || '计费面积*单价*数量'
  };
  if (editingTypeId) { const idx = types.findIndex(t => t.id === editingTypeId); if (idx > -1) types[idx] = item; }
  else types.push(item);
  save('ptypes', types); closeModal('typeModal'); refreshAdmin();
}

function delType(id) {
  if (!confirm('确定删除？')) return;
  types = types.filter(t => t.id !== id); save('ptypes', types); refreshAdmin();
}

function renderColorList() {
  document.getElementById('colorList').innerHTML = colors.map(c => `<span class="color-tag">${esc(c)}<span class="color-del" onclick="delColor('${esc(c)}')">✕</span></span>`).join('');
}

function addColorBtn() { document.getElementById('cName').value = ''; showModal('colorModal'); }
function saveColor() {
  const c = document.getElementById('cName').value.trim();
  if (!c) return;
  if (colors.includes(c)) { alert('已存在'); return; }
  colors.push(c); save('pcolors', colors); closeModal('colorModal'); refreshAdmin();
}
function delColor(c) { colors = colors.filter(x => x !== c); save('pcolors', colors); refreshAdmin(); }

function saveSetting() {
  quoteTitle = document.getElementById('setTitle').value.trim() || '门窗报价表';
  save('ptitle', quoteTitle);
  document.getElementById('quoteTitle').childNodes[0].textContent = quoteTitle + ' ';
  alert('已保存');
}

function changePwd() {
  const p1 = document.getElementById('setPwd1').value, p2 = document.getElementById('setPwd2').value;
  if (!p1 || p1.length < 4) { alert('密码至少4位'); return; }
  if (p1 !== p2) { alert('两次不一致'); return; }
  pwd = p1; save('ppwd', pwd);
  document.getElementById('setPwd1').value = ''; document.getElementById('setPwd2').value = '';
  alert('密码已修改');
}

function resetAll() {
  if (!confirm('所有数据恢复默认，确定？')) return;
  types = JSON.parse(JSON.stringify(DEF.types));
  colors = [...DEF.colors];
  quoteTitle = DEF.title;
  pwd = DEF.pwd;
  save('ptypes', types); save('pcolors', colors); save('ptitle', quoteTitle); save('ppwd', pwd);
  refreshAdmin();
}

// ==================== 工具 ====================
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ==================== 底部导航 ====================
function showHistory() { showPage('history'); }

// 底部Tab
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('quoteTitle').textContent = quoteTitle;
  renderRows();
  // 底部导航栏
  const nav = document.createElement('div');
  nav.innerHTML = `
    <div style="position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid #eee;z-index:999;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom))">
      <div style="flex:1;text-align:center;color:#2980b9;font-weight:600;font-size:13px;cursor:pointer" onclick="showPage('index')">📋 新建报价</div>
      <div style="flex:1;text-align:center;color:#666;font-size:13px;cursor:pointer" onclick="showHistory()">📚 历史记录</div>
    </div>
    <div style="height:50px"></div>`;
  document.body.appendChild(nav);
});
</script>
</body>
</html>
